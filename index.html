<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TotoB12 Minesweeper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="message"></div>
    <div id="buttons">
        <select id="sizeSelect">
            <option value="easy">Easy (8×8, 10 mines)</option>
            <option value="medium">Medium (16×16, 40 mines)</option>
            <option value="hard">Hard (24×24, 99 mines)</option>
        </select>
        <button id="restartBtn">Restart</button>
        <button id="giveUpBtn">Give Up</button>
        <label id="flagModeLabel">
            <input type="checkbox" id="flagMode">
            Flag Mode
        </label>
    </div>
    <div id="game"></div>
    <script src="script.js"></script>
</body>
</html>
